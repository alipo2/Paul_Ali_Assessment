apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: hello-world

resources:
  - ../../base
  - namespace.yaml
  - ingress.yaml

# Per-app override: only this line changes when this base is reused to
# stamp out another of the 20 similar apps (plus the ingress host/namespace).
images:
  - name: REGISTRY_PLACEHOLDER/flask-hello-world
    newName: ghcr.io/example-org/flask-hello-world
    newTag: "0.1.0"
