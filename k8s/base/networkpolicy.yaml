apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: flask-hello-world
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: flask-hello-world
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # Only the shared ingress controller may reach these pods directly.
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ingress-nginx
      ports:
        - protocol: TCP
          port: 8080
  egress:
    # DNS resolution.
    - to:
        - namespaceSelector: {}
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
