apiVersion: v1
kind: Service
metadata:
  name: flask-hello-world
  labels:
    app.kubernetes.io/name: flask-hello-world
spec:
  # ClusterIP on purpose: this app is exposed to the internet through the
  # cluster's shared Ingress controller/load balancer, not its own
  # cloud LoadBalancer. One LB per app for 20+ apps would multiply cloud
  # network-LB cost linearly; routing through one shared Ingress does not.
  type: ClusterIP
  selector:
    app.kubernetes.io/name: flask-hello-world
  ports:
    - name: http
      port: 80
      targetPort: http
